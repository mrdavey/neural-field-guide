# Inert template: GitHub does not run workflows stored under docs/.
# Follow docs/GITHUB_PAGES.md and copy this file to
# .github/workflows/deploy-pages.yml only when publication is intended.
name: Deploy course to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install pinned dependencies
        run: npm ci

      - name: Verify course before publishing
        run: npm test

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build static Pages export
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build:pages

      - name: Verify static Pages export
        env:
          EXPECTED_PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run verify:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
