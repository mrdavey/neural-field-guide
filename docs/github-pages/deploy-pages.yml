# Inert template: GitHub does not run workflows stored under docs/.
# Follow docs/GITHUB_PAGES.md and copy this file to
# .github/workflows/deploy-pages.yml only when publication is intended.
name: Deploy course to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-ci.txt
            public/capstone-artifacts/*/requirements-capstones.txt

      - name: Configure GitHub Pages
        id: pages
        if: github.event_name != 'schedule'
        uses: actions/configure-pages@v6

      - name: Verify the direct-main release contract
        env:
          CI_PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          CI_PYTHON: python
        run: npm run ci:verify

      - name: Upload Pages artifact
        if: github.event_name != 'schedule'
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    if: github.event_name != 'schedule'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
